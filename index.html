<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axe & Crates FPS</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui-health { position: absolute; bottom: 20px; left: 20px; width: 200px; height: 20px; background: #333; border: 2px solid #fff; }
        #health-bar { width: 100%; height: 100%; background: #ff3333; transition: width 0.3s; }
        #ui-coins { position: absolute; top: 20px; right: 20px; color: gold; font-size: 24px; font-weight: bold; text-shadow: 2px 2px #000; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

<div id="ui-health"><div id="health-bar"></div></div>
<div id="ui-coins">Coins: 0</div>
<div id="crosshair"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    // --- Core Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const loader = new GLTFLoader();
    const controls = new PointerLockControls(camera, document.body);
    document.addEventListener('click', () => controls.lock());

    // Lights
    const sun = new THREE.DirectionalLight(0xffffff, 1.0);
    sun.position.set(5, 10, 5);
    scene.add(sun, new THREE.AmbientLight(0xffffff, 0.4));

    // Floor
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x555555 }));
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // --- Game State ---
    let coins = 0;
    const crates = [];
    const bombs = [];
    const items = [];
    let isSwinging = false;

    // --- Axe Setup ---
    let axeGroup = new THREE.Group();
    camera.add(axeGroup);
    scene.add(camera); // Camera must be in scene to see child axe

    loader.load('./Axe.glb', (gltf) => {
        const axe = gltf.scene;
        axe.position.set(0.5, -0.5, -0.8); // Position in bottom right
        axe.rotation.y = Math.PI / 2;
        axe.scale.set(0.2, 0.2, 0.2);
        axeGroup.add(axe);
    });

    // --- Spawning Logic ---
    function spawnCrate(x, z) {
        loader.load('./crate.glb', (gltf) => {
            const crate = gltf.scene;
            crate.position.set(x, 0, z);
            crate.userData = { hp: 3, isCrate: true };
            scene.add(crate);
            crates.push(crate);
        });
    }
    spawnCrate(0, -5);
    spawnCrate(2, -5);

    function spawnReward(pos) {
        const type = Math.random() > 0.5 ? 'coin' : 'bomb';
        loader.load(`./${type}.glb`, (gltf) => {
            const obj = gltf.scene;
            obj.position.copy(pos);
            obj.userData = { type: type, createdAt: Date.now() };
            if (type === 'bomb') {
                obj.userData.timer = 5;
                bombs.push(obj);
            } else {
                items.push(obj);
            }
            scene.add(obj);
        });
    }

    // --- Combat Logic ---
    window.addEventListener('mousedown', () => {
        if (isSwinging || !controls.isLocked) return;
        isSwinging = true;

        // Visual Swing Animation (Simple rotation)
        const startRotation = axeGroup.rotation.x;
        const targetRotation = startRotation + 1.2;
        
        // Raycast for Hit
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
        const hits = raycaster.intersectObjects(crates, true);

        if (hits.length > 0 && hits[0].distance < 3) {
            let target = hits[0].object;
            while(target.parent && !target.userData.isCrate) target = target.parent;
            
            target.userData.hp -= 1;
            if (target.userData.hp <= 0) {
                spawnReward(target.position.clone());
                scene.remove(target);
                crates.splice(crates.indexOf(target), 1);
            }
        }

        // Return Axe
        setTimeout(() => { isSwinging = false; axeGroup.rotation.x = startRotation; }, 200);
        axeGroup.rotation.x = targetRotation;
    });

    // --- Movement Logic ---
    const move = { f: 0, r: 0 };
    window.addEventListener('keydown', (e) => {
        if(e.code === 'KeyW') move.f = 0.1;
        if(e.code === 'KeyS') move.f = -0.1;
        if(e.code === 'KeyA') move.r = -0.1;
        if(e.code === 'KeyD') move.r = 0.1;
    });
    window.addEventListener('keyup', (e) => {
        if(['KeyW', 'KeyS'].includes(e.code)) move.f = 0;
        if(['KeyA', 'KeyD'].includes(e.code)) move.r = 0;
    });

    // --- Main Loop ---
    function animate() {
        requestAnimationFrame(animate);

        if (controls.isLocked) {
            controls.moveForward(move.f);
            controls.moveRight(move.r);
        }

        // Bomb & Coin logic
        const now = Date.now();
        bombs.forEach((bomb, i) => {
            const age = (now - bomb.userData.createdAt) / 1000;
            if (age >= 5) {
                // Explosion effect (Simple scale flash)
                bomb.scale.set(3,3,3);
                setTimeout(() => { scene.remove(bomb); bombs.splice(i, 1); }, 100);
            }
            // Simple "pushing" if player is near
            if(camera.position.distanceTo(bomb.position) < 1) {
                bomb.position.add(camera.getWorldDirection(new THREE.Vector3()).multiplyScalar(0.05));
            }
        });

        items.forEach((coin, i) => {
            coin.rotation.y += 0.05;
            if(camera.position.distanceTo(coin.position) < 1.5) {
                coins++;
                document.getElementById('ui-coins').innerText = `Coins: ${coins}`;
                scene.remove(coin);
                items.splice(i, 1);
            }
        });

        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
