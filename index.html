<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Racing Demo</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; }
        canvas { display: block; }
    </style>
</head>
<body>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // --- Scene & Environment ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // Sky Blue
    
    // Simple Clouds (clumped spheres)
    function createCloud(x, z) {
        const group = new THREE.Group();
        const mat = new THREE.MeshLambertMaterial({ color: 0xffffff });
        for(let i=0; i<5; i++) {
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(2, 8, 8), mat);
            mesh.position.set(i * 1.5, Math.random(), Math.random() * 2);
            group.add(mesh);
        }
        group.position.set(x, 20, z);
        scene.add(group);
    }
    for(let i=0; i<10; i++) createCloud(Math.random()*200-100, Math.random()*200-100);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1.2);
    light.position.set(10, 20, 10);
    scene.add(light, new THREE.AmbientLight(0xffffff, 0.5));

    // --- Baseplate ---
    const floorGeo = new THREE.PlaneGeometry(1000, 1000);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // --- Car & Physics ---
    let carGroup = new THREE.Group();
    scene.add(carGroup);

    const stats = { speed: 0, accel: 0.006, friction: 0.97, maxSpeed: 0.8, steering: 0.04 };
    const keys = { w: false, s: false, a: false, d: false };
    const particles = [];

    const loader = new GLTFLoader();
    loader.load('./RaceCar.glb', (gltf) => {
        const model = gltf.scene;
        // Fix Orientation: Rotate the model -270 degrees (or 90 degrees) inside the group
        model.rotation.y = THREE.MathUtils.degToRad(-270);
        carGroup.add(model);
    });

    // --- Sputtering Smoke Logic ---
    function spawnSmoke() {
        const geo = new THREE.SphereGeometry(0.15, 6, 6);
        const mat = new THREE.MeshBasicMaterial({ color: 0xcccccc, transparent: true, opacity: 0.6 });
        const p = new THREE.Mesh(geo, mat);
        p.position.copy(carGroup.position);
        
        // Random drift
        const drift = { 
            x: (Math.random() - 0.5) * 0.1, 
            y: Math.random() * 0.05, 
            z: (Math.random() - 0.5) * 0.1 
        };
        
        particles.push({ mesh: p, life: 1.0, drift });
        scene.add(p);
    }

    // --- Input ---
    window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

    // --- Main Loop ---
    function animate() {
        requestAnimationFrame(animate);

        if (carGroup.children.length > 0) {
            // Acceleration & Deceleration Physics
            if (keys.w) {
                stats.speed += stats.accel;
                if (Math.random() > 0.4) spawnSmoke(); // Sputter on acceleration
            } else if (keys.s) {
                stats.speed -= stats.accel;
                if (Math.random() > 0.3) spawnSmoke(); // Sputter on braking/reverse
            } else {
                // Natural deceleration smoke (briefly while slowing down)
                if (Math.abs(stats.speed) > 0.1 && Math.random() > 0.8) spawnSmoke();
            }

            stats.speed *= stats.friction;
            
            if (keys.a) carGroup.rotation.y += stats.steering * (Math.abs(stats.speed) * 1.5);
            if (keys.d) carGroup.rotation.y -= stats.steering * (Math.abs(stats.speed) * 1.5);

            carGroup.translateX(stats.speed);

            // Camera Setup
            const offset = new THREE.Vector3(-8, 4, 0).applyMatrix4(carGroup.matrixWorld);
            camera.position.lerp(offset, 0.1);
            camera.lookAt(carGroup.position);

            // Particle Update
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.life -= 0.015;
                p.mesh.position.x += p.drift.x;
                p.mesh.position.y += p.drift.y;
                p.mesh.position.z += p.drift.z;
                p.mesh.scale.multiplyScalar(1.03);
                p.mesh.material.opacity = p.life;
                
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }
        }

        renderer.render(scene, camera);
    }

    animate();
</script>
</body>
</html>
