<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeep Compass Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #555555; font-family: sans-serif; }
        canvas { display: block; }
        #loading { 
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            color: white; 
            font-size: 24px; 
            pointer-events: none; 
        }
    </style>
</head>
<body>

<div id="loading">Loading Jeep Compass...</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x555555); // Simple grey space

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 15);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- Controls ---
    // OrbitControls handles all the mouse dragging, rotating, and zooming automatically
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; // Adds a smooth gliding effect when you let go
    controls.dampingFactor = 0.05;

    // --- Lighting ---
    // Good lighting is essential to see the details of the car
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight1 = new THREE.DirectionalLight(0xffffff, 1);
    dirLight1.position.set(10, 10, 10);
    scene.add(dirLight1);

    const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight2.position.set(-10, 10, -10);
    scene.add(dirLight2);

    // --- Load FBX Model ---
    const loader = new FBXLoader();
    loader.load(
        './JEEP COMPASS 2021.FBX', 
        (object) => {
            // Hide loading text
            document.getElementById('loading').style.display = 'none';

            // Center and scale the model so it fits nicely on screen
            const box = new THREE.Box3().setFromObject(object);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            // Re-center the model to (0,0,0)
            object.position.x -= center.x;
            object.position.y -= center.y;
            object.position.z -= center.z;

            // Scale it to a standard size (e.g., 10 units wide)
            const maxDim = Math.max(size.x, size.y, size.z);
            if (maxDim > 0) {
                object.scale.multiplyScalar(10 / maxDim);
            }

            scene.add(object);
        }, 
        (xhr) => {
            // Update loading text with progress
            const percent = Math.round((xhr.loaded / xhr.total) * 100);
            if (percent > 0) {
                document.getElementById('loading').innerText = `Loading: ${percent}%`;
            }
        }, 
        (error) => {
            console.error('Error loading FBX:', error);
            document.getElementById('loading').innerText = 'Error loading model. Check console.';
        }
    );

    // --- Main Animation Loop ---
    function animate() {
        requestAnimationFrame(animate);
        controls.update(); // Required for OrbitControls damping
        renderer.render(scene, camera);
    }
    animate();

    // --- Handle Window Resize ---
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
